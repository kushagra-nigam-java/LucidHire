version: '3.8'

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - api

  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: lucidhire
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}

  api:
    build:
      context: .
      dockerfile: infra/Dockerfile.api
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/lucidhire
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - DEMO_MODE=${DEMO_MODE:-true}
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      # Exposes the Docker socket safely to the orchestrator for ephemeral sandbox execution
      - /var/run/docker.sock:/var/run/docker.sock

  worker:
    build:
      context: .
      dockerfile: infra/Dockerfile.api
    command: celery -A services.logistics_worker.celery_app worker --loglevel=info
    restart: unless-stopped
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - DEMO_MODE=${DEMO_MODE:-true}

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # Backend API is mapped under the same domain via Caddy reverse proxy
      - NEXT_PUBLIC_API_URL=/api

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
